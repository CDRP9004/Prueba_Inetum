<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Asistente BBVA</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f4f5f7;
    color: #1a1a1a;
    display: flex;
    justify-content: center;
    height: 100vh;
  }
  #app {
    width: 100%;
    max-width: 720px;
    display: flex;
    flex-direction: column;
    height: 100vh;
    background: #fff;
    box-shadow: 0 0 12px rgba(0,0,0,0.08);
  }
  header {
    padding: 16px 20px;
    background: #072146;
    color: #fff;
  }
  header h1 { margin: 0; font-size: 18px; }
  header p { margin: 4px 0 0; font-size: 12px; opacity: 0.8; }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; line-height: 1.4; white-space: pre-wrap; }
  .msg.user { align-self: flex-end; background: #072146; color: #fff; border-bottom-right-radius: 2px; }
  .msg.assistant { align-self: flex-start; background: #eceff3; color: #1a1a1a; border-bottom-left-radius: 2px; }
  .msg.error { align-self: center; background: #fde8e8; color: #8a1f1f; font-size: 13px; }
  .sources { margin-top: 8px; font-size: 11px; opacity: 0.75; }
  .sources a { color: inherit; display: block; margin-top: 2px; }
  #composer {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    border-top: 1px solid #e2e2e2;
  }
  #composer input {
    flex: 1;
    padding: 10px 14px;
    border-radius: 20px;
    border: 1px solid #d0d0d0;
    font-size: 14px;
  }
  #composer button {
    padding: 10px 18px;
    border-radius: 20px;
    border: none;
    background: #072146;
    color: #fff;
    cursor: pointer;
    font-size: 14px;
  }
  #composer button:disabled { opacity: 0.5; cursor: default; }
  #session-info { font-size: 11px; opacity: 0.6; padding: 0 16px 8px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Asistente BBVA</h1>
    <p>Preguntá sobre productos y servicios de BBVA México (RAG sobre el sitio institucional)</p>
  </header>
  <div id="messages"></div>
  <div id="session-info"></div>
  <form id="composer">
    <input id="input" type="text" placeholder="Escribí tu pregunta..." autocomplete="off" />
    <button id="send" type="submit">Enviar</button>
  </form>
</div>

<script>
  const SESSION_KEY = "bbva_rag_session_id";
  let sessionId = localStorage.getItem(SESSION_KEY);
  if (!sessionId) {
    sessionId = crypto.randomUUID();
    localStorage.setItem(SESSION_KEY, sessionId);
  }
  document.getElementById("session-info").textContent = "Sesión: " + sessionId;

  const messagesEl = document.getElementById("messages");
  const inputEl = document.getElementById("input");
  const sendBtn = document.getElementById("send");
  const form = document.getElementById("composer");

  function addMessage(role, text, sources) {
    const div = document.createElement("div");
    div.className = "msg " + role;
    div.textContent = text;
    if (sources && sources.length) {
      const srcDiv = document.createElement("div");
      srcDiv.className = "sources";
      sources.forEach((s) => {
        const a = document.createElement("a");
        a.href = s.url;
        a.target = "_blank";
        a.textContent = "↳ " + s.title;
        srcDiv.appendChild(a);
      });
      div.appendChild(srcDiv);
    }
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function loadHistory() {
    try {
      const resp = await fetch("/history/" + sessionId);
      if (!resp.ok) return;
      const history = await resp.json();
      history.forEach((m) => addMessage(m.role, m.content));
    } catch (e) {
      // sin historial previo, no pasa nada
    }
  }

  async function sendMessage(message) {
    addMessage("user", message);
    inputEl.value = "";
    sendBtn.disabled = true;

    try {
      const resp = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ session_id: sessionId, message }),
      });

      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        addMessage("error", err.detail || ("Error " + resp.status));
        return;
      }

      const data = await resp.json();
      addMessage("assistant", data.answer, data.sources);
    } catch (e) {
      addMessage("error", "No se pudo conectar con el servidor.");
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  form.addEventListener("submit", (e) => {
    e.preventDefault();
    const message = inputEl.value.trim();
    if (message) sendMessage(message);
  });

  loadHistory();
</script>
</body>
</html>
